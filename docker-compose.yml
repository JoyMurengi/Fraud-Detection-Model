version: '3.8'

services:
  # Fraud detection model API
  
  fraud-detection:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detection-api
    ports:
      - "5000:5000"
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=production
    volumes:
      - ./logs:/app/logs  # Mount logs directory
    networks:
      - fraud-detection-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MLflow tracking server (optional)
  mlflow-server:
    image: mlflow/mlflow:2.8.1
    container_name: mlflow-tracking
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=./mlruns
    volumes:
      - ./mlflow_data:/mlflow
    networks:
      - fraud-detection-network
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5000

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: fraud-detection-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fraud-detection
    networks:
      - fraud-detection-network
    restart: unless-stopped

networks:
  fraud-detection-network:
    driver: bridge

volumes:
  mlflow_data:
    driver: local
